<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>МГЕ-СР — вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a0000; /* Тёмно-красный, почти чёрный */
            font-family: 'Segoe UI', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 820px;
            width: 100%;
            background: #2b0a0a; /* Тёмно-красный фон карточки */
            border: 4px solid #8b0000; /* Тёмно-красный */
            border-radius: 40px;
            padding: 50px 40px 40px;
            box-shadow: 0 20px 60px rgba(139, 0, 0, 0.5);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            box-shadow: 0 20px 80px rgba(204, 0, 0, 0.3);
        }

        /* Флаг + заголовок */
        .emblem {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        /* ТВОЙ ФЛАГ из папки images */
        .flag {
            width: 100px;
            height: 60px;
            object-fit: cover;
            border: 2px solid #d4af37;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .title {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: #d4af37; /* Золотой */
            line-height: 1.2;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .title span {
            color: #ff3333; /* Яркий красный акцент */
        }

        .subtitle {
            font-size: 1.4rem;
            font-weight: 700;
            color: #cc0000;
            margin-top: -2px;
            letter-spacing: 5px;
            text-transform: uppercase;
            border-top: 2px solid #d4af37;
            border-bottom: 2px solid #d4af37;
            display: inline-block;
            padding: 6px 24px;
            background: #1a0000;
            border-radius: 60px;
            color: #e0c080;
        }

        .divider {
            margin: 30px 0 25px;
            height: 3px;
            background: linear-gradient(90deg, #2b0a0a, #d4af37, #cc0000, #8b0000, #cc0000, #d4af37, #2b0a0a);
            border-radius: 10px;
        }

        .question {
            font-size: 1.5rem;
            font-weight: 600;
            color: #f0e0d0;
            margin-bottom: 30px;
        }

        .question small {
            display: block;
            font-size: 1rem;
            font-weight: 400;
            color: #aa8888;
            margin-top: 6px;
        }

        .buttons {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            flex: 1 1 200px;
            padding: 20px 18px;
            border: 3px solid #8b0000;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 700;
            background: #1a0000;
            color: #e0c080;
            cursor: pointer;
            transition: 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 0 #8b000044;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(139, 0, 0, 0.4);
        }

        .btn-yes {
            background: #8b0000;
            color: #ffffff;
            border-color: #d4af37;
        }

        .btn-yes:hover {
            background: #cc0000;
            border-color: #d4af37;
            box-shadow: 0 12px 28px rgba(204, 0, 0, 0.5);
        }

        .btn-no {
            background: #1a0000;
            color: #aa8888;
            border-color: #5a2a2a;
        }

        .btn-no:hover {
            background: #5a2a2a;
            color: #ffffff;
            border-color: #8b0000;
            box-shadow: 0 12px 28px rgba(139, 0, 0, 0.3);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #aa7777;
            border-top: 1px solid #5a2a2a;
            padding-top: 20px;
            letter-spacing: 2px;
        }

        .footer span {
            color: #d4af37;
            font-weight: 700;
        }

        .stars {
            font-size: 0.7rem;
            color: #d4af37;
            letter-spacing: 10px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Флаг + заголовок -->
        <div class="emblem">
            <img src="images/flag.png" alt="Флаг МГЕ-СР" class="flag" />
            <div class="title">
                МГЕ<span>-СР</span>
            </div>
            <img src="images/flag.png" alt="Флаг МГЕ-СР" class="flag" />
        </div>

        <div class="subtitle">
            Мге Социалистическая Республика
        </div>

        <div class="divider"></div>

        <div class="question">
            ❓ Ты гражданин МГЕ-СР?
            <small>Честно. Паровозик видит всё.</small>
        </div>

        <div class="buttons">
            <button class="btn btn-yes" id="btnYes">
                ✅ Я являюсь гражданином МГЕ-СР
            </button>
            <button class="btn btn-no" id="btnNo">
                ⛔ Я НЕ являюсь гражданином МГЕ-СР
            </button>
        </div>

        <div class="footer">
            <div class="stars">✦ ✦ ✦</div>
            <span>МГЕ-СР</span> — Всё для фрага, всё ради фрага
            <div class="stars">✦ ✦ ✦</div>
        </div>
    </div>

    <script>
        document.getElementById('btnYes').addEventListener('click', function() {
            alert('🔥 Добро пожаловать, гражданин! Ты в строю.');
            this.textContent = '✅ ПОДТВЕРЖДЕНО';
            this.disabled = true;
        });

        document.getElementById('btnNo').addEventListener('click', function() {
            alert('🚫 Доступ к аренам закрыт. Паровозик ждёт тебя, когда созреешь.');
            this.textContent = '⛔ ОТКАЗАНО';
            this.disabled = true;
        });
    </script>
</body>
</html>
