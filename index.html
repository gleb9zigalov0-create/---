<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>МГЕ-СР — вход</title>
    <style>
        /* Общее */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff; /* Белый */
            font-family: 'Segoe UI', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 820px;
            width: 100%;
            background: #ffffff;
            border: 4px solid #8b0000; /* Тёмно-красный */
            border-radius: 40px;
            padding: 50px 40px 40px;
            box-shadow: 0 20px 60px rgba(139, 0, 0, 0.25);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            box-shadow: 0 20px 60px rgba(139, 0, 0, 0.4);
        }

        /* Герб / флаг (заглушка) */
        .emblem {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .flag-placeholder {
            width: 80px;
            height: 50px;
            background: linear-gradient(180deg, #ffffff 33%, #cc0000 33%, #cc0000 66%, #8b0000 66%);
            border: 2px solid #8b0000;
            border-radius: 8px;
            position: relative;
        }

        .flag-placeholder::after {
            content: "★";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8rem;
            color: #d4af37; /* Золотой */
            text-shadow: 0 0 10px #d4af37aa;
        }

        .title {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: #8b0000; /* Тёмно-красный */
            line-height: 1.2;
        }

        .title span {
            color: #d4af37; /* Золотой */
        }

        .subtitle {
            font-size: 1.4rem;
            font-weight: 700;
            color: #cc0000; /* Красный */
            margin-top: -2px;
            letter-spacing: 5px;
            text-transform: uppercase;
            border-top: 2px solid #d4af37;
            border-bottom: 2px solid #d4af37;
            display: inline-block;
            padding: 6px 24px;
            background: #fff8f0;
            border-radius: 60px;
        }

        .divider {
            margin: 30px 0 25px;
            height: 3px;
            background: linear-gradient(90deg, #ffffff, #d4af37, #cc0000, #8b0000, #cc0000, #d4af37, #ffffff);
            border-radius: 10px;
        }

        .question {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 30px;
        }

        .question small {
            display: block;
            font-size: 1rem;
            font-weight: 400;
            color: #555;
            margin-top: 6px;
        }

        .buttons {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            flex: 1 1 200px;
            padding: 20px 18px;
            border: 3px solid #8b0000;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 700;
            background: #ffffff;
            color: #8b0000;
            cursor: pointer;
            transition: 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 0 #8b000033;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(139, 0, 0, 0.25);
        }

        .btn-yes {
            background: #cc0000;
            color: #ffffff;
            border-color: #cc0000;
        }

        .btn-yes:hover {
            background: #8b0000;
            border-color: #8b0000;
            box-shadow: 0 12px 28px rgba(204, 0, 0, 0.4);
        }

        .btn-no {
            background: #ffffff;
            color: #8b0000;
            border-color: #8b0000;
        }

        .btn-no:hover {
            background: #8b0000;
            color: #ffffff;
            border-color: #8b0000;
            box-shadow: 0 12px 28px rgba(139, 0, 0, 0.3);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #8b0000;
            border-top: 1px solid #cc000066;
            padding-top: 20px;
            letter-spacing: 2px;
        }

        .footer span {
            color: #d4af37;
            font-weight: 700;
        }

        /* Золотые звёздочки (декор) */
        .stars {
            font-size: 0.7rem;
            color: #d4af37;
            letter-spacing: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Герб + флаг -->
        <div class="emblem">
            <div class="flag-placeholder"></div>
            <div class="title">
                МГЕ<span>-СР</span>
            </div>
            <div class="flag-placeholder"></div>
        </div>

        <div class="subtitle">
            Мге Социалистическая Республика
        </div>

        <div class="divider"></div>

        <div class="question">
            ❓ Ты гражданин МГЕ-СР?
            <small>Честно. Паровозик видит всё.</small>
        </div>

        <!-- Кнопки выбора -->
        <div class="buttons">
            <button class="btn btn-yes" id="btnYes">
                ✅ Я являюсь гражданином МГЕ-СР
            </button>
            <button class="btn btn-no" id="btnNo">
                ⛔ Я НЕ являюсь гражданином МГЕ-СР
            </button>
        </div>

        <div class="footer">
            <div class="stars">✦ ✦ ✦</div>
            <span>МГЕ-СР</span> — Всё для фрага, всё ради фрага
            <div class="stars">✦ ✦ ✦</div>
        </div>
    </div>

    <script>
        // Простая реакция на кнопки
        document.getElementById('btnYes').addEventListener('click', function() {
            alert('🔥 Добро пожаловать, гражданин! Ты в строю.');
            this.textContent = '✅ ПОДТВЕРЖДЕНО';
            this.disabled = true;
        });

        document.getElementById('btnNo').addEventListener('click', function() {
            alert('🚫 Доступ к аренам закрыт. Паровозик ждёт тебя, когда созреешь.');
            this.textContent = '⛔ ОТКАЗАНО';
            this.disabled = true;
        });
    </script>
</body>
</html>
